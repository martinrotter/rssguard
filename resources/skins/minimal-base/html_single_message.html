<div class="article" dir="%article_rtl%" id="%article_id%">
    <section class="article-header">
        <h2>%article_title%</h2>
        <div><span title="%feed_tooltip%">🌐 %article_feed% </span> <span title="%author_tooltip%">👤 %article_author% </span> <span title="%date_tooltip%">🗓️ %article_date% </span></div>
        <div class="article-urls-strip"><a class="article-url" href="%article_url%" %article_blanking%>URL</a>%enclosures_all%</div>
        <div>%enclosures_images%</div>
    </section>
    <hr class="article-separator">
    <div class="article-body">
        %article_contents%
    </div>
</div>
